async function dbq(t,m,b,f){
  const r=await fetch(SURL+"/rest/v1/"+t+(f||""),{method:m||"GET",headers:{"apikey":SKEY,"Authorization":"Bearer "+SKEY,"Content-Type":"application/json","Prefer":"return=representation"},body:b?JSON.stringify(b):null});
  if(!r.ok)throw new Error(await r.text());
  const tx=await r.text();return tx?JSON.parse(tx):[];
}

// Perú es UTC-5 fijo (sin horario de verano). Usamos ese offset fijo en vez de
// depender de la zona horaria del navegador/celular de cada quien — si algún
// celular tiene mal la zona configurada, la hora mostrada sale distinta según
// quién la mire. Con el offset fijo, todos ven la misma hora real siempre.
function peruNow(){return new Date(Date.now()-5*60*60*1000);}
function fmtHora(iso){if(!iso)return"";try{const d=new Date(new Date(iso).getTime()-5*60*60*1000);return d.getUTCHours().toString().padStart(2,"0")+":"+d.getUTCMinutes().toString().padStart(2,"0");}catch(e){return"";}}

function QRScanner({onScan,onClose}){
  const [found,setFound]=useState([]); // hasta 2 IMEIs válidos detectados
  const [rejected,setRejected]=useState(null);
  const [rejectedHint,setRejectedHint]=useState(null);
  const [camError,setCamError]=useState(null);
  const [starting,setStarting]=useState(true);
  const scannerRef=useRef(null);
  const foundRef=useRef([]);
  // Igual que en Flutter: si es 15 dígitos limpio, lo acepta. Si es un número
  // larguísimo de puros dígitos (20+, como el EID de eSIM de Samsung, 32 dígitos),
  // NO se toca — ahí no hay ningún IMEI real adentro, inventar uno sería peligroso.
  // Si mezcla texto con el IMEI, ahí sí extrae los 15 dígitos de adentro.
  function extractImei(val){
    const clean=val.replace(/\s/g,"");
    if(/^\d{15}$/.test(clean))return clean;
    if(/^\d+$/.test(clean)&&clean.length>=20)return null;
    const m=clean.match(/\d{15}/);
    return m?m[0]:null;
  }
  useEffect(()=>{
    let cancelled=false;
    const scanner=new Html5Qrcode("qr-web-box");
    scannerRef.current=scanner;
    const onDetect=text=>{
      const clean=text.replace(/\s/g,"");
      const imei=extractImei(clean);
      if(imei){
        if(foundRef.current.length<2&&!foundRef.current.includes(imei)){
          foundRef.current=[...foundRef.current,imei];
          setFound(foundRef.current);
          setRejected(null);
          setRejectedHint(null);
        }
      }else if(foundRef.current.length===0){
        setRejected(clean.length>20?clean.substring(0,20)+"...":clean);
        setRejectedHint(/^\d+$/.test(clean)&&clean.length>=20?"Eso es el EID (identificador eSIM), no el IMEI — buscá la barra de código que dice 'IMEI 1'.":null);
      }
    };
    async function tryStart(){
      setCamError(null);setStarting(true);
      // Intento 1: pedir directamente la cámara trasera
      try{
        await scanner.start({facingMode:"environment"},{fps:10,qrbox:{width:300,height:160}},onDetect,()=>{});
        if(!cancelled)setStarting(false);
        return;
      }catch(e1){ if(cancelled)return; }
      // Intento 2 (fallback, común en iPhone/Safari): listar cámaras disponibles y usar la última (suele ser la trasera)
      try{
        const cams=await Html5Qrcode.getCameras();
        if(!cams||cams.length===0)throw new Error("No se encontró ninguna cámara disponible.");
        const cam=cams[cams.length-1];
        await scanner.start({deviceId:{exact:cam.id}},{fps:10,qrbox:{width:300,height:160}},onDetect,()=>{});
        if(!cancelled)setStarting(false);
        return;
      }catch(e2){
        if(!cancelled){
          setStarting(false);
          setCamError((e2&&e2.message)||"No se pudo activar la cámara. Revisá que le diste permiso de cámara a Safari en Ajustes.");
        }
      }
    }
    tryStart();
    return()=>{cancelled=true;scanner.stop().catch(()=>{});};
  },[]);
  function reset(){foundRef.current=[];setFound([]);setRejected(null);setRejectedHint(null);}
  function confirm(){
    if(found.length===0)return;
    scannerRef.current&&scannerRef.current.stop().catch(()=>{});
    onScan(found.length>=2?found:found[0]);
  }
  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.95)",zIndex:9999,display:"flex",flexDirection:"column"}}>
    <div style={{padding:"16px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",background:"rgba(0,0,0,0.5)"}}>
      <span style={{color:"#fff",fontWeight:800,fontSize:18}}>⬛ Escanear IMEI (15 dígitos)</span>
      <button onClick={onClose} style={{background:"rgba(255,255,255,0.15)",border:"none",color:"#fff",padding:"8px 18px",borderRadius:99,cursor:"pointer",fontSize:15,fontWeight:700}}>✕</button>
    </div>
    <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16,padding:16}}>
      <div id="qr-web-box" style={{width:"90vw",maxWidth:380,borderRadius:16,overflow:"hidden",border:"3px solid "+(found.length>0?C.green:C.blue)}}/>
      {starting&&!camError&&<div style={{color:"rgba(255,255,255,0.7)",fontSize:14,textAlign:"center"}}>Activando cámara...</div>}
      {camError&&<div style={{background:C.redDim,border:"1px solid "+C.red,borderRadius:16,padding:18,width:"90vw",maxWidth:380,textAlign:"center"}}>
        <div style={{color:C.red,fontWeight:800,marginBottom:6}}>⚠️ No se pudo abrir la cámara</div>
        <div style={{color:C.text,fontSize:13,marginBottom:10}}>{camError}</div>
        <div style={{color:C.muted,fontSize:12}}>En iPhone: Ajustes → Safari → Cámara → Permitir. Luego recargá la página.</div>
      </div>}
      {found.length===0&&!starting&&!camError&&<div style={{color:"rgba(255,255,255,0.7)",fontSize:14,textAlign:"center"}}>Apuntá al código de barras del IMEI<br/>Solo acepta 15 dígitos numéricos<br/>Si hay 2 (dual SIM), apuntá a ambos de seguido</div>}
      {found.length===0&&rejected&&<div style={{color:C.amber,fontSize:13,textAlign:"center"}}>⚠️ Detectado: {rejected}<br/>{rejectedHint||"No es IMEI — seguí buscando el de 15 dígitos"}</div>}
      {found.length>0&&<div style={{background:C.card,border:"2px solid "+C.green,borderRadius:16,padding:18,width:"90vw",maxWidth:380}}>
        <div style={{color:C.muted,fontSize:12,marginBottom:8}}>{found.length>=2?"✅ 2 IMEIs detectados:":"✅ IMEI detectado:"}</div>
        {found.map((f,i)=><div key={i} style={{marginBottom:i<found.length-1?10:0}}>
          {found.length>=2&&<div style={{color:C.muted,fontSize:11}}>IMEI {i+1}</div>}
          <div style={{color:C.green,fontSize:20,fontWeight:900,fontFamily:"monospace",letterSpacing:2}}>{f}</div>
        </div>)}
        {found.length===1&&<div style={{color:C.muted,fontSize:12,marginTop:8}}>Seguí apuntando si hay un segundo IMEI, o confirmá con este solo.</div>}
        <div style={{display:"flex",gap:10,marginTop:14}}>
          <button onClick={reset} style={{flex:1,padding:12,borderRadius:12,border:"1px solid "+C.muted,background:"transparent",color:C.muted,fontWeight:700,cursor:"pointer"}}>Reintentar</button>
          <button onClick={confirm} style={{flex:1,padding:12,borderRadius:12,border:"none",background:C.green,color:"#0a0f1e",fontWeight:800,cursor:"pointer"}}>{found.length>=2?"✓ Usar estos 2 IMEIs":"✓ Usar este IMEI"}</button>
        </div>
      </div>}
    </div>
  </div>;
}

// ─── LOGIN ────────────────────────────────────────────────────────────────
function Login({onLogin}){
  const [u,setU]=useState(""); const [p,setP]=useState(""); const [err,setErr]=useState(""); const [loading,setLoading]=useState(false); const [showP,setShowP]=useState(false);
  const [step,setStep]=useState(1); const [loggedUser,setLoggedUser]=useState(null); const [tienda,setTienda]=useState("NM 3");
  async function go(){
    if(!u||!p){setErr("Ingresá usuario y contraseña");return;}
    setLoading(true);setErr("");
    try{
      let users=await api.get("usuarios","?username=eq."+u+"&password=eq."+p);
      if(users.length===0){
        const all=await api.get("usuarios","?limit=1");
        if(all.length===0){for(const usr of INIT_USERS){try{await api.post("usuarios",usr);}catch(e){}}users=await api.get("usuarios","?username=eq."+u+"&password=eq."+p);}
      }
      if(users.length>0){
        const usr=users[0];
        if(usr.rol==="admin"||usr.rol==="almacen"||usr.rol==="tienda"){onLogin(usr);}
        else{setLoggedUser(usr);setStep(2);}
      }else{setErr("Usuario o contraseña incorrectos");}
    }catch(e){setErr("Error de conexión");}
    setLoading(false);
  }
  function confirmarTienda(){onLogin({...loggedUser,tienda});}

  if(step===2)return <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,background:"linear-gradient(135deg, #0a0f1e, #0f2044, #0a1628)",overflowY:"auto"}}>
    <div style={{width:"100%",maxWidth:420,background:"rgba(17,24,39,0.95)",borderRadius:24,padding:28,border:"1px solid rgba(99,179,237,0.2)"}}>
      <div style={{textAlign:"center",marginBottom:20}}>
        <div style={{fontSize:44,marginBottom:8}}>🏪</div>
        <div style={{color:"#fff",fontSize:20,fontWeight:800}}>Hola, {loggedUser?.nombre}!</div>
        <div style={{color:C.muted,fontSize:15,marginTop:4}}>¿En qué tienda trabajás hoy?</div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:20}}>
        {TIENDAS_EMP.map(t=><button key={t} onClick={()=>setTienda(t)} style={{padding:"16px 20px",borderRadius:16,border:"2px solid "+(tienda===t?C.blue:"rgba(99,179,237,0.2)"),background:tienda===t?"rgba(56,189,248,0.12)":"transparent",color:tienda===t?C.blue:C.text,fontSize:17,fontWeight:tienda===t?700:400,cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:12}}>
          <span style={{fontSize:20}}>🏪</span>{t}{tienda===t&&<span style={{marginLeft:"auto",color:C.blue}}>✓</span>}
        </button>)}
      </div>
      <Btn onClick={confirmarTienda} full>Entrar a {tienda} →</Btn>
      <button onClick={()=>setStep(1)} style={{width:"100%",marginTop:12,background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:14}}>← Cambiar usuario</button>
    </div>
  </div>;

  return <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,background:"linear-gradient(135deg, #0a0f1e, #0f2044, #0a1628)",overflowY:"auto"}}>
    <div style={{width:"100%",maxWidth:420,background:"rgba(17,24,39,0.95)",borderRadius:24,padding:28,border:"1px solid rgba(99,179,237,0.2)"}}>
      <div style={{textAlign:"center",marginBottom:24}}>
        <div style={{fontSize:48,marginBottom:8}}>📱</div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:4}}>
          <span style={{fontWeight:900,fontSize:26,color:"#fff"}}>IMPORT</span>
          <span style={{fontWeight:900,fontSize:26,color:C.blue}}>CELLS</span>
        </div>
        <div style={{background:C.blueDim,borderRadius:99,padding:"5px 14px",fontSize:12,color:C.blue,fontWeight:600,display:"inline-block",marginTop:6}}>🟢 Import Sales · Sistema en vivo</div>
      </div>
      {err&&<div style={{background:C.redDim,border:"1px solid rgba(248,113,113,0.3)",borderRadius:12,padding:"12px 16px",color:C.red,marginBottom:14,textAlign:"center",fontWeight:600}}>{err}</div>}
      <div style={{marginBottom:14}}><label style={LS}>Usuario</label><input style={{...IS,fontSize:17}} value={u} placeholder="anthony, jeremy..." autoCapitalize="none" onChange={e=>setU(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()}/></div>
      <div style={{marginBottom:20,position:"relative"}}><label style={LS}>Contraseña</label><input style={{...IS,fontSize:17}} type={showP?"text":"password"} value={p} placeholder="••••••" onChange={e=>setP(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()}/><button onClick={()=>setShowP(!showP)} style={{position:"absolute",right:14,top:34,background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:18}}>{showP?"🙈":"👁️"}</button></div>
      <Btn onClick={go} full disabled={loading} style={{fontSize:17,padding:"17px"}}>{loading?"Ingresando...":"Ingresar →"}</Btn>
    </div>
  </div>;
}

function Papelera({onClose,onRestore}){
  const [items,setItems]=useState([]); const [loading,setLoading]=useState(true); const [toast,setToast]=useState(null);
  async function load(){
    setLoading(true);
    try{setItems(await api.get("inventario","?eliminado=eq.true&order=created_at.desc"));}
    catch(e){setToast({t:"error",m:"La papelera todavía no está lista (falta correr el SQL en Supabase)"});}
    setLoading(false);
  }
  useEffect(()=>{load();},[]);
  async function restaurar(p){
    try{
      await api.patch("inventario",p.id,{eliminado:false,estado:"disponible"});
      setItems(prev=>prev.filter(x=>x.id!==p.id));
      onRestore&&onRestore();
    }catch(e){setToast({t:"error",m:"Error: "+e.message});}
  }
  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",zIndex:998,display:"flex",alignItems:"flex-end"}} onClick={onClose}>
    <div style={{width:"100%",maxHeight:"85vh",background:C.surface,borderRadius:"24px 24px 0 0",padding:24,overflowY:"auto"}} onClick={e=>e.stopPropagation()}>

        <div key={p.id} style={{background:"#1e293b",borderRadius:12,padding:14,marginBottom:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{color:C.text,fontWeight:700}}>{p.marca} {p.modelo}</div>

          </div>
          <button onClick={()=>restaurar(p)} style={{background:C.green,border:"none",borderRadius:10,padding:"8px 16px",color:"#0a0f1e",fontWeight:800,cursor:"pointer"}}>Restaurar</button>
        </div>
      )}
    </div>
  </div>;
}

function Inventario({user}){
  const [items,setItems]=useState([]); const [modelosSug,setModelosSug]=useState([]); const [loading,setLoading]=useState(true);

  const [provInput,setProvInput]=useState(""); const [showProvSug,setShowProvSug]=useState(false);

  function onMarcaChange(v){setMarcaInput(v);ff("marca")(v);if(v.length>=1){const q=v.toLowerCase();setShowMarcaSug(marcasTodos.some(m=>m.toLowerCase().includes(q)));}else setShowMarcaSug(false);}

  // Lista combinada de colores: predefinidos + los que se han escrito antes (sin duplicar)
  const coloresTodos=(()=>{const set=new Map();COLORES.forEach(c=>set.set(c.toLowerCase(),c));coloresGuardados.forEach(c=>{if(c.color)set.set(c.color.toLowerCase(),c.color);});return Array.from(set.values());})();
  const proveedoresTodos=(()=>{const set=new Map();proveedoresGuardados.forEach(p=>{if(p.proveedor)set.set(p.proveedor.toLowerCase(),p.proveedor);});return Array.from(set.values());})();
  // Lista combinada de marcas: predefinidas + cualquier marca nueva ya usada en modelos guardados
  const marcasTodos=(()=>{const set=new Map();MARCAS.forEach(m=>set.set(m.toLowerCase(),m));modelosSug.forEach(m=>{if(m.marca)set.set(m.marca.toLowerCase(),m.marca);});return Array.from(set.values());})();

  async function load(){setLoading(true);try{setItems(await api.get("inventario","?eliminado=eq.false&order=created_at.desc"));}catch(e){try{setItems(await api.get("inventario","?order=created_at.desc"));}catch(e2){setToast({t:"error",m:"Error cargando"});}}setLoading(false);}
  async function loadSug(){try{setModelosSug(await api.get("modelos_guardados","?order=created_at.desc"));}catch(e){}}

  async function loadProveedores(){try{setProveedoresGuardados(await api.get("proveedores_guardados","?order=created_at.desc"));}catch(e){}}
  useEffect(()=>{load();loadSug();loadColores();loadProveedores();},[]);

  function onColorChange(v){setColorInput(v);ff("color")(v);if(v.length>=1){const q=v.toLowerCase();setShowColorSug(coloresTodos.some(c=>c.toLowerCase().includes(q)));}else setShowColorSug(false);}
  function selectColor(c){setColorInput(c);ff("color")(c);setShowColorSug(false);}
  function onProvChange(v){setProvInput(v);ff("proveedor")(v);if(v.length>=1){const q=v.toLowerCase();setShowProvSug(proveedoresTodos.some(p=>p.toLowerCase().includes(q)));}else setShowProvSug(false);}

  async function saveNewColorAndProv(){
    const c=(form.color||"").trim(); const p=(form.proveedor||"").trim();
    if(c&&!coloresTodos.some(x=>x.toLowerCase()===c.toLowerCase())){try{await api.post("colores_guardados",{color:c});loadColores();}catch(e){}}
    if(p&&!proveedoresTodos.some(x=>x.toLowerCase()===p.toLowerCase())){try{await api.post("proveedores_guardados",{proveedor:p});loadProveedores();}catch(e){}}

  function onModeloChange(v){setModeloInput(v);ff("modelo")(v);if(v.length>=2){const q=v.toLowerCase();const f=modelosSug.filter(m=>(m.modelo||"").toLowerCase().includes(q)||(m.marca||"").toLowerCase().includes(q)).slice(0,5);setShowSug(f.length>0);}else setShowSug(false);}

  async function imeiYaExiste(imei,excludeId){
    const v=(imei||"").trim();

      const r1=await api.get("inventario","?imei=eq."+encodeURIComponent(v));
      const r2=await api.get("inventario","?imei2=eq."+encodeURIComponent(v));

  async function add(){
    if(!form.marca||!form.modelo.trim()){setToast({t:"error",m:"Marca y Modelo son obligatorios"});return;}

    try{
      let provNoGuardado=false;
      try{
        await api.post("inventario",obj);
      }catch(e){
        const {proveedor,...objSinProveedor}=obj;
        try{
          await api.post("inventario",objSinProveedor);
        }catch(e2){
          const {imei2,...objBasico}=objSinProveedor;
          await api.post("inventario",objBasico);
        }
        provNoGuardado=true;
      }
      try{await api.post("modelos_guardados",{marca:form.marca,modelo:form.modelo,ram:form.ram,almacenamiento:form.almacenamiento});}catch(e){}
      await saveNewColorAndProv();

      setForm(E);setModeloInput("");setMarcaInput("");setColorInput("");setProvInput("");setShow(false);load();loadSug();
    }catch(e){setToast({t:"error",m:"Error: "+e.message});}
    setSaving(false);
  }

  async function saveEdit(){
    setSaving(true);
    try{
      await api.patch("inventario",editItem.id,{marca:form.marca,modelo:form.modelo,color:form.color,almacenamiento:form.almacenamiento,ram:form.ram,precio:+form.precio,precio_mayorista:+(form.precio_mayorista||0),costo:+(form.costo||0),tipo:form.tipo,ubicacion:form.ubicacion,proveedor:form.proveedor||"",imei:form.imei,imei2:form.imei2||"",notas:form.notas});
      await saveNewColorAndProv();
      setToast({t:"ok",m:"Teléfono actualizado"});setEditItem(null);setForm(E);load();
    }catch(e){setToast({t:"error",m:"Error: "+e.message});}
    setSaving(false);
  }

  const filtered=items.filter(p=>{
    const q=search.toLowerCase();
    return(!q||(p.imei||"").includes(q)||(p.imei2||"").includes(q)||(p.marca||"").toLowerCase().includes(q)||(p.modelo||"").toLowerCase().includes(q)||(p.color||"").toLowerCase().includes(q))&&(fs==="todos"||p.estado===fs);
  });
  const disponibles=filtered.filter(p=>p.estado==="disponible");

  // Group by modelo
  function groupBy(arr){const g={};arr.forEach(p=>{const k=(p.marca||"")+" "+(p.modelo||"");g[k]=g[k]||[];g[k].push(p);});return g;}

function Entregas({user}){
  const [list,setList]=useState([]); const [dist,setDist]=useState([]); const [inv,setInv]=useState([]);
  const [loading,setLoading]=useState(true); const [show,setShow]=useState(false); const [saving,setSaving]=useState(false);
  const [fs,setFs]=useState("todos"); const [toast,setToast]=useState(null); const [showQR,setShowQR]=useState(false);
  const [fechaFiltro,setFechaFiltro]=useState(fechaHoyPeru());
  const [verTodas,setVerTodas]=useState(false);
  const E={inv_id:"",dist_id:"",marca:"",modelo:"",imei:"",almacenamiento:"",precio:"",pagado:"0",metodo:"transferencia",notas:""};
  const [form,setForm]=useState(E); const ff=k=>v=>setForm(p=>({...p,[k]:v}));
  async function load(){setLoading(true);try{const [d,r,i]=await Promise.all([api.get("entregas","?order=created_at.desc"),api.get("revendedores","?order=nombre.asc"),api.get("inventario","?estado=eq.disponible&order=marca.asc")]);setList(d);setDist(r);setInv(i);}catch(e){setToast({t:"error",m:"Error"});}setLoading(false);}
  useEffect(()=>{load();},[]);

  function handleQR(imeiOrArr){
    const imei=Array.isArray(imeiOrArr)?imeiOrArr[0]:imeiOrArr;
    setShowQR(false);
    const found=inv.find(p=>p.imei===imei);
    if(found){setForm(p=>({...p,inv_id:found.id,marca:found.marca||"",modelo:found.modelo||"",imei:found.imei||"",almacenamiento:found.almacenamiento||"",precio:(found.precio_mayorista>0?found.precio_mayorista:found.precio)||""}));if(!show)setShow(true);setToast({t:"ok",m:"✅ "+found.marca+" "+found.modelo+" cargado"});}
    else{ff("imei")(imei);setToast({t:"ok",m:"IMEI escaneado: "+imei});}
  }

  async function submit(){
    if(!form.dist_id){setToast({t:"error",m:"⚠️ El Distribuidor es obligatorio"});return;}
    if(!form.modelo.trim()){setToast({t:"error",m:"⚠️ El Modelo es obligatorio"});return;}
    if(!form.imei.trim()){setToast({t:"error",m:"⚠️ El IMEI es obligatorio"});return;}
    const precio=+form.precio;if(precio<=0){setToast({t:"error",m:"⚠️ Ingresá un precio válido"});return;}
    setSaving(true);
    try{
      const r=dist.find(x=>x.id===form.dist_id)||{};
      const paid=Math.min(+(form.pagado||0),precio);
      const ps=paid>=precio?"pagado":paid>0?"parcial":"pendiente";
      const now=new Date();
      const obj={inventario_id:form.inv_id||null,revendedor_id:form.dist_id,revendedor_nombre:r.nombre||"",revendedor_telefono:r.telefono||"",empleado_nombre:user.nombre,marca:form.marca,modelo:form.modelo,imei:form.imei,almacenamiento:form.almacenamiento,precio,pagado:paid,estado_pago:ps,metodo_pago:form.metodo,fecha_entrega:now.toISOString().substring(0,10),hora_entrega:now.toTimeString().substring(0,5),notas:form.notas};
      await api.post("entregas",obj);
      if(form.inv_id)await api.patch("inventario",form.inv_id,{estado:"entregado"});
      setToast({t:"ok",m:"Entrega registrada"});setForm(E);setShow(false);load();
    }catch(e){setToast({t:"error",m:"Error: "+e.message});}
    setSaving(false);
  }

  async function markPaid(id,precio){const d=list.find(x=>x.id===id);if(!d)return;await api.patch("entregas",id,{pagado:precio,estado_pago:"pagado"});load();}
  async function devolver(id,invId){
    if(!confirm("¿Devolver al inventario?"))return;
    const d=list.find(x=>x.id===id);
    await api.patch("entregas",id,{estado_pago:"devuelto"});
    let restaurado=false;
    try{
      if(invId){
        await api.patch("inventario",invId,{estado:"disponible"});
        restaurado=true;
      }else if(d&&d.imei){
        // Entregas antiguas sin inventario_id guardado: buscamos por IMEI como respaldo.
        const found=await api.get("inventario","?imei=eq."+encodeURIComponent(d.imei));
        if(found&&found[0]){await api.patch("inventario",found[0].id,{estado:"disponible"});restaurado=true;}
      }
    }catch(e){}
    if(restaurado)setToast({t:"ok",m:"Teléfono devuelto al inventario"});
    else setToast({t:"error",m:"⚠️ Se marcó devuelto, pero no se encontró el teléfono en Inventario. Búscalo y usá el botón 'Disponible' para arreglarlo a mano."});
    load();
  }
  async function openWA(phone,msg){const clean=phone.replace(/[^0-9]/g,"");let num=clean;if(!num.startsWith("51"))num="51"+num;const uri="whatsapp://send?phone="+num+"&text="+encodeURIComponent(msg);window.open("https://wa.me/"+num+"?text="+encodeURIComponent(msg));}

  function enFecha(d){
    if(verTodas)return true;
    if(d.estado_pago==="pendiente"||d.estado_pago==="parcial")return true;
    const f=(d.fecha_entrega||"").substring(0,10);
    return f===fechaFiltro;
  }
  const filtered=list.filter(d=>(fs==="todos"||d.estado_pago===fs)&&enFecha(d));
  const pendTotal=list.filter(d=>d.estado_pago!=="pagado"&&d.estado_pago!=="devuelto").reduce((a,d)=>a+(d.precio-d.pagado),0);

  return <div style={{flex:1,overflowY:"auto",padding:16}}>
    <Toast msg={toast} onClose={()=>setToast(null)}/>
    {showQR&&<QRScanner onScan={handleQR} onClose={()=>setShowQR(false)}/>}
    <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:12}}>
      <div>
        <h2 style={{fontSize:24,fontWeight:900}}>🚚 Entregas</h2>
        {pendTotal>0&&<div style={{background:C.redDim,color:C.red,fontSize:13,fontWeight:700,marginTop:4,padding:"3px 12px",borderRadius:99,display:"inline-block"}}>🔴 Por cobrar: S/.{pendTotal.toLocaleString()}</div>}
      </div>
      <div style={{display:"flex",gap:8}}>
        <button onClick={()=>setShowQR(true)} style={{background:C.blueDim,border:"2px solid "+C.blue,borderRadius:12,padding:"10px 14px",cursor:"pointer",fontSize:18,color:C.blue}}>⬛</button>
        <Btn onClick={()=>{setShow(!show);setForm(E);}} small>{show?"✕":"+ Nueva"}</Btn>
      </div>
    </div>
    {show&&<div style={{...KS,border:"2px solid "+C.blue,marginBottom:16}} className="su">
      <div style={{color:C.blue,fontWeight:800,fontSize:17,marginBottom:14}}>📦 Nueva Entrega</div>
      <div style={{marginBottom:12}}>
        <label style={LS}>Distribuidor ★</label>
        <select style={{...IS,appearance:"none"}} value={form.dist_id} onChange={e=>ff("dist_id")(e.target.value)}>
          <option value="">Seleccionar distribuidor...</option>
          {dist.map(r=><option key={r.id} value={r.id}>{r.nombre}</option>)}
        </select>
      </div>
      <div style={{marginBottom:12}}>
        <label style={LS}>Del inventario (opcional)</label>
        <select style={{...IS,appearance:"none"}} value={form.inv_id} onChange={e=>{const ph=inv.find(p=>p.id===e.target.value);if(ph)setForm(p=>({...p,inv_id:e.target.value,marca:ph.marca||"",modelo:ph.modelo||"",imei:ph.imei||"",almacenamiento:ph.almacenamiento||"",precio:(ph.precio_mayorista>0?ph.precio_mayorista:ph.precio)||""}));else ff("inv_id")("");}}>
          <option value="">— Manual —</option>
          {inv.map(p=><option key={p.id} value={p.id}>{p.marca} {p.modelo} {p.almacenamiento} — IMEI: {p.imei||"sin IMEI"}</option>)}
        </select>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
        <Field label="Modelo ★" value={form.modelo} onChange={ff("modelo")} placeholder="iPhone 17 Pro"/>
        <div><label style={LS}>IMEI ★</label><div style={{display:"flex",gap:8}}><input style={{...IS,flex:1}} value={form.imei} placeholder="15 dígitos" onChange={e=>ff("imei")(e.target.value)}/><button onClick={()=>setShowQR(true)} style={{background:C.blueDim,border:"1px solid "+C.blue,borderRadius:10,padding:"0 12px",cursor:"pointer",color:C.blue}}>⬛</button></div></div>
        <Field label="Precio (S/.) ★" value={form.precio} onChange={ff("precio")} type="number"/>
        <Field label="Abono (S/.)" value={form.pagado} onChange={ff("pagado")} type="number"/>
      </div>
      <Field label="Forma de pago" value={form.metodo} onChange={ff("metodo")} options={[{v:"transferencia",l:"Transferencia"},{v:"efectivo",l:"Efectivo"},{v:"tarjeta",l:"Tarjeta"}]}/>
      <div style={{marginTop:12}}><Field label="Notas" value={form.notas} onChange={ff("notas")} placeholder="Notas..."/></div>
      <div style={{display:"flex",gap:10,marginTop:14}}>
        <Btn onClick={submit} full disabled={saving}>{saving?"⏳ Guardando...":"✓ Registrar entrega"}</Btn>
        <Btn onClick={()=>setShow(false)} variant="ghost">✕</Btn>
      </div>
    </div>}
    <div style={{...KS,marginBottom:14,display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
      <div style={{flex:1,minWidth:160}}>
        <label style={LS}>Fecha</label>
        <input style={IS} type="date" value={fechaFiltro} max={fechaHoyPeru()} disabled={verTodas} onChange={e=>setFechaFiltro(e.target.value)}/>
      </div>
      <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",color:C.muted,fontSize:14}}>
        <input type="checkbox" checked={verTodas} onChange={e=>setVerTodas(e.target.checked)} style={{width:18,height:18,cursor:"pointer"}}/>
        Ver todas las fechas
      </label>
      <div style={{color:C.muted,fontSize:11,fontStyle:"italic",width:"100%"}}>Las pendientes de cobro siempre se muestran, sin importar la fecha</div>
    </div>
    <div style={{display:"flex",gap:8,marginBottom:14,overflowX:"auto"}}>
      {["todos","pendiente","parcial","pagado"].map(f=><button key={f} onClick={()=>setFs(f)} style={{padding:"9px 16px",borderRadius:99,border:"1px solid "+(fs===f?C.blue:C.border),background:fs===f?"rgba(56,189,248,0.15)":"rgba(255,255,255,0.05)",color:fs===f?C.blue:C.muted,cursor:"pointer",fontSize:13,fontWeight:600,whiteSpace:"nowrap"}}>{f.charAt(0).toUpperCase()+f.slice(1)}</button>)}

    </div>
    {loading?<Spin/>:filtered.length===0?<div style={{textAlign:"center",color:C.muted,padding:40}}>{verTodas?"Sin entregas":"Sin entregas nuevas este día"}</div>:filtered.map(d=>{
      const falta=(d.precio||0)-(d.pagado||0);
      const color=d.estado_pago==="pagado"?C.green:d.estado_pago==="parcial"?C.amber:C.red;
      const phone=(d.revendedor_telefono||"");
      const waMsg="Hola "+d.revendedor_nombre+"! Recordatorio:\n📱 "+(d.marca||"")+" "+d.modelo+"\n🔴 Debe: S/."+falta.toFixed(0);

      </div>;
    })}
  </div>;

    // El faltante se suma a Efectivo (asumimos que se cobró en efectivo la diferencia),
    // así el desglose que usa la pantalla de Caja también cuadra y no queda déficit fantasma.
    await api.patch("ventas",s.id,{pagado:precio,estado_pago:"pagado",pago_efectivo:(s.pago_efectivo||0)+faltante});

// ─── DEUDORES ──────────────────────────────────────────────────────────────
function Deudores({user}){
  const [entregas,setEntregas]=useState([]); const [dist,setDist]=useState([]);
  const [loading,setLoading]=useState(true); const [toast,setToast]=useState(null);
  const [search,setSearch]=useState(""); const [expandido,setExpandido]=useState({}); const [abonos,setAbonos]=useState({});
  const today=fechaHoyPeru();
  async function load(){setLoading(true);try{const [e,d]=await Promise.all([api.get("entregas","?estado_pago=neq.pagado&estado_pago=neq.devuelto&order=fecha_entrega.asc"),api.get("revendedores","?order=nombre.asc")]);setEntregas(e);setDist(d);}catch(e){setToast({t:"error",m:"Error"});}setLoading(false);}
  useEffect(()=>{load();},[]);
  async function abonar(distId,monto){
    const pend=[...entregas.filter(e=>e.revendedor_id===distId)].sort((a,b)=>a.fecha_entrega.localeCompare(b.fecha_entrega));
    let rest=+monto;
    for(const e of pend){if(rest<=0)break;const f=e.precio-e.pagado;const ab=Math.min(f,rest);const nv=e.pagado+ab;rest-=ab;await api.patch("entregas",e.id,{pagado:nv,estado_pago:nv>=e.precio?"pagado":"parcial"});}
    setToast({t:"ok",m:"Pago registrado"});load();
  }
  async function pagarTodo(distId,pend){for(const e of pend)await api.patch("entregas",e.id,{pagado:e.precio,estado_pago:"pagado"});setToast({t:"ok",m:"Todo pagado"});load();}
  function openWA(phone,msg){const clean=phone.replace(/[^0-9]/g,"");let num=clean;if(!num.startsWith("51"))num="51"+num;window.open("https://wa.me/"+num+"?text="+encodeURIComponent(msg));}

  const grupos=dist.map(d=>{
    const pend=entregas.filter(e=>e.revendedor_id===d.id);
    if(!pend.length)return null;
    const debe=pend.reduce((a,e)=>a+(e.precio-e.pagado),0);
    const total=pend.reduce((a,e)=>a+e.precio,0);
    const pagado=pend.reduce((a,e)=>a+e.pagado,0);
    const venc=pend.filter(e=>e.fecha_pago_esperado<today).length;
    return{dist:d,pend,debe,total,pagado,venc};
  }).filter(Boolean).filter(g=>!search||g.dist.nombre.toLowerCase().includes(search.toLowerCase()));
  const totalGlobal=grupos.reduce((a,g)=>a+g.debe,0);

  return <div style={{flex:1,overflowY:"auto",padding:16}}>
    <Toast msg={toast} onClose={()=>setToast(null)}/>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
      <h2 style={{fontSize:24,fontWeight:900}}>🔴 Deudores</h2>
      <button onClick={load} style={{background:C.card,border:"1px solid "+C.border,borderRadius:10,padding:"8px 14px",color:C.muted,cursor:"pointer"}}>🔄</button>
    </div>
    <div style={{background:C.redDim,color:C.red,fontSize:14,fontWeight:700,padding:"6px 14px",borderRadius:99,display:"inline-block",marginBottom:14}}>Total: S/.{totalGlobal.toLocaleString()}</div>
    <input style={{...IS,marginBottom:14}} placeholder="🔍 Buscar distribuidor..." value={search} onChange={e=>setSearch(e.target.value)}/>
    {loading?<Spin/>:grupos.length===0?<div style={{...KS,textAlign:"center",padding:40}}><div style={{fontSize:44,marginBottom:10}}>✅</div><div style={{color:C.green,fontWeight:800,fontSize:18}}>¡Todo cobrado!</div></div>:
    grupos.map(({dist:d,pend,debe,total,pagado,venc})=>{
      const isExp=expandido[d.id];
      const phone=(d.telefono||"");
      const msgs=pend.map(e=>"📱 "+(e.marca||"")+" "+e.modelo+" → S/."+((e.precio-e.pagado).toFixed(0))).join("\n");
      const waMsg="Hola "+d.nombre+"! Resumen de deuda:\n\n"+msgs+"\n\n💰 Total: S/."+total.toFixed(0)+"\n✅ Pagado: S/."+pagado.toFixed(0)+"\n🔴 DEBE: S/."+debe.toFixed(0)+"\n\nPor favor coordinar pago. Gracias!";
      return <div key={d.id} style={{...KS,borderLeft:"4px solid "+(venc>0?C.red:C.amber),marginBottom:16}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
          <div><div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:20}}>🏪</span><span style={{fontWeight:900,fontSize:21,letterSpacing:0.3}}>{(d.nombre||"").toUpperCase()}</span></div><div style={{color:C.muted,fontSize:13,marginTop:2}}>👤 {d.contacto||"—"} · 📱 {d.telefono||"Sin número"}</div>{venc>0&&<span style={{background:C.redDim,color:C.red,padding:"3px 10px",borderRadius:99,fontSize:12,fontWeight:700,marginTop:4,display:"inline-block"}}>⚠️ {venc} vencida{venc>1?"s":""}</span>}</div>
          <div style={{textAlign:"right"}}><div style={{color:C.red,fontWeight:900,fontSize:24}}>S/.{debe.toLocaleString()}</div><div style={{color:C.muted,fontSize:12}}>de S/.{total.toLocaleString()}</div></div>
        </div>
        <div style={{background:C.amberDim,border:"1px solid rgba(251,191,36,0.2)",borderRadius:12,padding:14,marginBottom:12}}>
          <div style={{color:C.amber,fontWeight:700,fontSize:14,marginBottom:10}}>💵 Registrar pago</div>
          <div style={{display:"flex",gap:8,marginBottom:8}}>
            <input style={{...IS,flex:1}} type="number" placeholder="Monto (S/.)" value={abonos[d.id]||""} onChange={e=>setAbonos(p=>({...p,[d.id]:e.target.value}))}/>
            <Btn onClick={()=>{if(abonos[d.id]&&+abonos[d.id]>0){abonar(d.id,abonos[d.id]);setAbonos(p=>({...p,[d.id]:""}))}else setToast({t:"error",m:"Ingresá el monto"});}} variant="amber" small>Abonar</Btn>
          </div>
          <div style={{display:"flex",gap:8}}>
            <Btn onClick={()=>{if(confirm("¿Marcar todo de "+d.nombre+" como pagado?"))pagarTodo(d.id,pend);}} variant="success" small style={{flex:1}}>✓ Todo pagado</Btn>
            {phone&&<Btn onClick={()=>openWA(phone,waMsg)} variant="wa" small style={{flex:1}}>💬 WhatsApp</Btn>}
          </div>
        </div>
        <button onClick={()=>setExpandido(p=>({...p,[d.id]:!p[d.id]}))} style={{width:"100%",background:"rgba(255,255,255,0.04)",border:"1px solid "+C.border,borderRadius:10,padding:10,color:C.muted,cursor:"pointer",fontSize:13}}>
          {isExp?"▲ Ocultar entregas":"▼ Ver "+pend.length+" entregas"}
        </button>
        {isExp&&<div style={{marginTop:10}}>
          {pend.map(e=><div key={e.id} style={{background:"rgba(255,255,255,0.04)",borderRadius:10,padding:12,marginBottom:6}}>
            <div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontWeight:600,fontSize:15}}>{e.marca} {e.modelo}</span><span style={{color:C.red,fontWeight:800}}>S/.{(e.precio-e.pagado).toLocaleString()}</span></div>
            <div style={{color:C.muted,fontSize:12}}>{e.fecha_entrega} · {e.empleado_nombre}</div>
            {e.fecha_pago_esperado<today&&<div style={{color:C.red,fontSize:12,fontWeight:700}}>⚠️ VENCIDO</div>}
          </div>)}
        </div>}
      </div>;
    })}
  </div>;
}

// ─── CIERRE DE CAJA ─────────────────────────────────────────────────────────
function CierreCaja({user}){
  const [ventas,setVentas]=useState([]); const [entregas,setEntregas]=useState([]); const [loading,setLoading]=useState(true);
  const [fecha,setFecha]=useState(fechaHoyPeru()); const [cerrando,setCerrando]=useState({});
  const isAdmin=user.rol==="admin"; const esA6=(user.tienda||"")==="NM A6";
  const tiendas=isAdmin?TIENDAS_EMP:[user.tienda||"NM 3"];
  async function load(){setLoading(true);try{const [v,e]=await Promise.all([api.get("ventas","?order=created_at.desc"),api.get("entregas","?order=created_at.desc")]);setVentas(v);setEntregas(e);}catch(e){}setLoading(false);}
  useEffect(()=>{load();},[]);
  function ventasDia(tienda){return ventas.filter(v=>(v.fecha||"").substring(0,10)===fecha&&v.tienda===tienda&&v.estado_pago!=="anulado");}
  function pagosDist(){return entregas.filter(e=>(e.fecha_entrega||"").substring(0,10)===fecha&&(e.estado_pago==="pagado"||e.estado_pago==="parcial"));}
  async function cerrar(tienda){
    if(!confirm("¿Cerrar caja de "+tienda+" del "+fecha+"?"))return;
    setCerrando(p=>({...p,[tienda]:true}));
    const vs=ventasDia(tienda);const tot=vs.reduce((a,v)=>a+(v.precio_venta||0),0);const cob=vs.reduce((a,v)=>a+(v.pagado||0),0);
    const ahoraPeru=peruNow();
    const horaCierre=ahoraPeru.getUTCHours().toString().padStart(2,"0")+":"+ahoraPeru.getUTCMinutes().toString().padStart(2,"0");
    try{await api.post("auditoria",{usuario:user.nombre,accion:"CIERRE DE CAJA - "+tienda,tabla:"ventas",detalle:"Fecha: "+fecha+" | Hora de cierre: "+horaCierre+" | Tienda: "+tienda+" | Total: S/."+tot+" | Cobrado: S/."+cob+" | Ventas: "+vs.length});}catch(e){}
    setCerrando(p=>({...p,[tienda]:false}));
    alert("✅ Caja "+tienda+" cerrada correctamente para el "+fecha);
  }
  function CajaCard({tienda}){
    const vs=ventasDia(tienda);
    const total=vs.reduce((a,v)=>a+(v.precio_venta||0),0);
    const ef=vs.reduce((a,v)=>a+(v.pago_efectivo||0),0);
    const yp=vs.reduce((a,v)=>a+(v.pago_yape||0),0);
    const tr=vs.reduce((a,v)=>a+(v.pago_transferencia||0),0);
    const tj=vs.reduce((a,v)=>a+(v.pago_tarjeta||0),0);
    const cobrado=ef+yp+tr+tj;
    const pendiente=total-cobrado;
    const porVendedor={};vs.forEach(v=>{const emp=v.empleado||"Sin vendedor";if(!porVendedor[emp])porVendedor[emp]=[];porVendedor[emp].push(v);});
    return <div style={{...KS,border:"1px solid rgba(56,189,248,0.2)",marginBottom:16}}>
      <div style={{background:C.blueDim,borderRadius:10,padding:"10px 14px",marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{color:C.blue,fontWeight:800,fontSize:16}}>🏪 {tienda}</span>
        <span style={{color:C.muted,fontSize:13}}>{vs.length} venta{vs.length!==1?"s":""}</span>
      </div>
      {vs.length===0?<div style={{color:C.muted,textAlign:"center",padding:16}}>Sin ventas este día</div>:<>
        <div style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid "+C.border}}><span style={{color:C.muted,fontSize:14}}>📦 Total vendido</span><span style={{color:C.blue,fontWeight:700,fontSize:15}}>S/.{total.toLocaleString()}</span></div>
        <div style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid "+C.border}}><span style={{color:C.muted,fontSize:14}}>✅ Total cobrado</span><span style={{color:C.green,fontWeight:700,fontSize:15}}>S/.{cobrado.toLocaleString()}</span></div>
        {pendiente>0&&<div style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid "+C.border}}><span style={{color:C.muted,fontSize:14}}>⏳ Pendiente</span><span style={{color:C.red,fontWeight:700,fontSize:15}}>S/.{pendiente.toLocaleString()}</span></div>}
        <div style={{margin:"14px 0 10px",color:C.muted,fontSize:11,fontWeight:700,letterSpacing:1}}>COBROS RECIBIDOS</div>
        {[["💵 Efectivo",ef,C.green],["📱 Yape",yp,C.purple],["🏦 Transferencia",tr,C.blue],["💳 Tarjeta",tj,C.amber]].filter(([,v])=>v>0).map(([l,v,c])=><div key={l} style={{background:c+"22",border:"1px solid "+c+"44",borderRadius:10,padding:"10px 14px",marginBottom:8,display:"flex",justifyContent:"space-between"}}><span style={{color:c,fontWeight:600,fontSize:14}}>{l}</span><span style={{color:c,fontWeight:900,fontSize:16}}>S/.{v.toLocaleString()}</span></div>)}
        <div style={{margin:"14px 0 10px",color:C.muted,fontSize:11,fontWeight:700,letterSpacing:1}}>POR VENDEDOR — QUIÉN DEBE ENTREGAR QUÉ</div>
        {Object.keys(porVendedor).sort().map(emp=>{
          const vEmp=porVendedor[emp];
          const efE=vEmp.reduce((a,v)=>a+(v.pago_efectivo||0),0);
          const ypE=vEmp.reduce((a,v)=>a+(v.pago_yape||0),0);
          const trE=vEmp.reduce((a,v)=>a+(v.pago_transferencia||0),0);
          const tjE=vEmp.reduce((a,v)=>a+(v.pago_tarjeta||0),0);
          return <div key={emp} style={{background:"rgba(255,255,255,0.04)",border:"1px solid "+C.border,borderRadius:10,padding:"10px 12px",marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
              <span style={{color:C.text,fontWeight:700,fontSize:14}}>👤 {emp}</span>
              <span style={{color:C.muted,fontSize:12}}>{vEmp.length} venta{vEmp.length!==1?"s":""}</span>
            </div>
            {efE>0&&<div style={{color:C.green,fontSize:13,fontWeight:600}}>💵 Debe entregar en efectivo: S/.{efE.toLocaleString()}</div>}
            {ypE>0&&<div style={{color:C.purple,fontSize:13}}>📱 Yape: S/.{ypE.toLocaleString()}</div>}
            {trE>0&&<div style={{color:C.blue,fontSize:13}}>🏦 Transferencia: S/.{trE.toLocaleString()}</div>}
            {tjE>0&&<div style={{color:C.amber,fontSize:13}}>💳 Tarjeta: S/.{tjE.toLocaleString()}</div>}
            <div style={{marginTop:6}}>
              {vEmp.map((v,i)=><div key={i} style={{color:C.muted,fontSize:11}}>{fmtHora(v.created_at)&&fmtHora(v.created_at)+" · "}{v.modelo} · S/.{(v.precio_venta||0).toLocaleString()}</div>)}
            </div>
          </div>;
        })}
        <div style={{marginTop:4,color:C.muted,fontSize:11,fontWeight:700,letterSpacing:1,marginBottom:8}}>DETALLE DE VENTAS</div>
        {vs.map((v,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid "+C.border}}>
          <div><div style={{fontWeight:600,fontSize:14}}>{v.modelo}</div><div style={{color:C.muted,fontSize:12}}>{fmtHora(v.created_at)&&"🕐 "+fmtHora(v.created_at)+" · "}{v.empleado} · {v.metodo_pago}</div></div>
          <span style={{color:C.green,fontWeight:700}}>S/.{(v.precio_venta||0).toLocaleString()}</span>
        </div>)}
        <div style={{marginTop:14}}><Btn onClick={()=>cerrar(tienda)} full disabled={cerrando[tienda]}>{cerrando[tienda]?"⏳ Cerrando...":"🔒 Cerrar caja del día"}</Btn></div>
      </>}
    </div>;
  }
  return <div style={{flex:1,overflowY:"auto",padding:16}}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
      <h2 style={{fontSize:24,fontWeight:900}}>📋 Cierre de Caja</h2>
      <button onClick={load} style={{background:C.card,border:"1px solid "+C.border,borderRadius:10,padding:"8px 14px",color:C.muted,cursor:"pointer"}}>🔄</button>
    </div>
    <div style={{...KS,marginBottom:16}}>
      <label style={LS}>Fecha</label>
      <input style={IS} type="date" value={fecha} max={fechaHoyPeru()} onChange={e=>setFecha(e.target.value)}/>
    </div>
    {loading?<Spin/>:<>
      {tiendas.map(t=><CajaCard key={t} tienda={t}/>)}
      {(isAdmin||esA6)&&<div style={{...KS,border:"1px solid rgba(251,191,36,0.3)",marginBottom:16}}>
        <div style={{background:C.amberDim,borderRadius:10,padding:"10px 14px",marginBottom:14,display:"flex",justifyContent:"space-between"}}>
          <span style={{color:C.amber,fontWeight:800,fontSize:16}}>🚚 NM A6 — Pagos distribuidores</span>
          <span style={{color:C.muted,fontSize:13}}>{pagosDist().length}</span>
        </div>
        {pagosDist().length===0?<div style={{color:C.muted,textAlign:"center",padding:16}}>Sin pagos de distribuidores hoy</div>:
        <><div style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid "+C.border}}><span style={{color:C.muted}}>💰 Total cobrado</span><span style={{color:C.amber,fontWeight:700}}>S/.{pagosDist().reduce((a,e)=>a+(e.pagado||0),0).toLocaleString()}</span></div>
        {pagosDist().map((e,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid "+C.border}}>
          <div><div style={{fontWeight:600,fontSize:14}}>{e.revendedor_nombre}</div><div style={{color:C.muted,fontSize:12}}>{e.marca} {e.modelo}</div></div>
          <span style={{color:C.amber,fontWeight:700}}>S/.{(e.pagado||0).toLocaleString()}</span>
        </div>)}</>}
      </div>}
    </>}
  </div>;
}

// ─── APP ────────────────────────────────────────────────────────────────────
// ─── USUARIOS ──────────────────────────────────────────────────────────────
function Usuarios(){
  const [items,setItems]=useState([]); const [loading,setLoading]=useState(true); const [toast,setToast]=useState(null);
  const [editId,setEditId]=useState(null); const [saving,setSaving]=useState(false);
  const [showPass,setShowPass]=useState({});
  const E={nombre:"",username:"",password:"",rol:"empleado",tienda:""};
  const [form,setForm]=useState(E); const ff=k=>v=>setForm(p=>({...p,[k]:v}));
  const [showNew,setShowNew]=useState(false);

  async function load(){setLoading(true);try{setItems(await api.get("usuarios","?order=nombre.asc"));}catch(e){setToast({t:"error",m:"Error cargando usuarios"});}setLoading(false);}
  useEffect(()=>{load();},[]);

  function startEdit(u){setEditId(u.id);setForm({nombre:u.nombre||"",username:u.username||"",password:u.password||"",rol:u.rol||"empleado",tienda:u.tienda||""});setShowNew(false);}
  function cancelEdit(){setEditId(null);setForm(E);setShowNew(false);}

  async function save(){
    if(!form.nombre.trim()||!form.username.trim()||!form.password.trim()){setToast({t:"error",m:"Nombre, usuario y contraseña son obligatorios"});return;}
    setSaving(true);
    try{
      const obj={nombre:form.nombre.trim(),username:form.username.trim().toLowerCase(),password:form.password,rol:form.rol,tienda:form.tienda||null};
      if(editId){await api.patch("usuarios",editId,obj);setToast({t:"ok",m:"Usuario actualizado"});}
      else{await api.post("usuarios",obj);setToast({t:"ok",m:"Usuario creado"});}
      cancelEdit();load();
    }catch(e){setToast({t:"error",m:"Error: "+e.message});}
    setSaving(false);
  }

  function UserForm({title}){
    return <div style={{...KS,border:"2px solid "+C.blue,marginBottom:16}} className="su">
      <div style={{color:C.blue,fontWeight:800,fontSize:17,marginBottom:14}}>{title}</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
        <Field label="Nombre completo" value={form.nombre} onChange={ff("nombre")} placeholder="Ej: Jeremy"/>
        <Field label="Usuario (login)" value={form.username} onChange={ff("username")} placeholder="Ej: jeremy"/>
        <Field label="Contraseña" value={form.password} onChange={ff("password")} placeholder="Nueva contraseña"/>
        <div><label style={LS}>Rol</label><select style={{...IS,appearance:"none"}} value={form.rol} onChange={e=>ff("rol")(e.target.value)}>
          <option value="admin">Admin</option>
          <option value="empleado">Empleado (rota de tienda)</option>
          <option value="tienda">Tienda (fija)</option>
          <option value="almacen">Almacén</option>
        </select></div>
        {(form.rol==="tienda"||form.rol==="almacen")&&<Field label="Tienda fija" value={form.tienda} onChange={ff("tienda")} options={TIENDAS}/>}
      </div>
      <div style={{display:"flex",gap:10}}>
        <Btn onClick={save} full disabled={saving}>{saving?"⏳ Guardando...":"✓ Guardar"}</Btn>
        <Btn onClick={cancelEdit} variant="ghost">✕</Btn>
      </div>
    </div>;
  }

  return <div style={{flex:1,overflowY:"auto",padding:16}}>
    <Toast msg={toast} onClose={()=>setToast(null)}/>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
      <h2 style={{fontSize:24,fontWeight:900,color:C.text}}>👤 Usuarios</h2>
      <div style={{display:"flex",gap:8}}>
        <button onClick={load} style={{background:C.card,border:"1px solid "+C.border,borderRadius:12,padding:"10px 14px",color:C.muted,cursor:"pointer"}}>🔄</button>
        <Btn onClick={()=>{setShowNew(!showNew);setEditId(null);setForm(E);}} small>{showNew?"✕":"+ Nuevo"}</Btn>
      </div>
    </div>
    {showNew&&<UserForm title="➕ Nuevo usuario"/>}
    {loading?<Spin/>:items.length===0?<div style={{textAlign:"center",color:C.muted,padding:40}}>Sin usuarios</div>:
      items.map(u=>editId===u.id?<UserForm key={u.id} title={"✏️ Editar: "+u.nombre}/>:
        <div key={u.id} style={{...KS,marginBottom:10}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div>
              <div style={{fontWeight:800,fontSize:16,color:C.text}}>{u.nombre}</div>
              <div style={{color:C.muted,fontSize:13,marginTop:2}}>Usuario: <span style={{color:C.blue,fontFamily:"monospace"}}>{u.username}</span></div>
              <div style={{color:C.muted,fontSize:13,marginTop:2,display:"flex",alignItems:"center",gap:6}}>
                Contraseña: <span style={{fontFamily:"monospace"}}>{showPass[u.id]?u.password:"••••••••"}</span>
                <span onClick={()=>setShowPass(p=>({...p,[u.id]:!p[u.id]}))} style={{cursor:"pointer",color:C.blue,fontSize:12}}>{showPass[u.id]?"ocultar":"ver"}</span>
              </div>
              <div style={{marginTop:8,display:"flex",gap:6,flexWrap:"wrap"}}>
                <span style={{background:C.blueDim,color:C.blue,padding:"2px 10px",borderRadius:99,fontSize:12,fontWeight:700}}>{u.rol}</span>
                {u.tienda&&<span style={{background:C.amberDim,color:C.amber,padding:"2px 10px",borderRadius:99,fontSize:12}}>{u.tienda}</span>}
              </div>
            </div>
            <button onClick={()=>startEdit(u)} style={{background:"rgba(56,189,248,0.1)",border:"1px solid rgba(56,189,248,0.3)",borderRadius:8,padding:"6px 14px",color:C.blue,cursor:"pointer",fontSize:13}}>✏️ Editar</button>
          </div>
        </div>
      )}
  </div>;
}

function App(){
  const [user,setUser]=useState(null); const [tab,setTab]=useState("dashboard");
  if(!user)return <div style={{display:"flex",flexDirection:"column",height:"100vh"}}><Login onLogin={u=>{setUser(u);setTab(u.rol==="admin"?"dashboard":"inventario");}}/></div>;
  const isAdmin=user.rol==="admin";
  const allTabs=[
    {id:"dashboard",label:"Inicio",icon:"📊",roles:["admin"]},
    {id:"inventario",label:"Inventario",icon:"📦",roles:["admin","almacen","tienda","empleado"]},
    {id:"entregas",label:"Entregas",icon:"🚚",roles:["admin","almacen","empleado"]},
    {id:"ventas",label:"Ventas",icon:"💰",roles:["admin","tienda","empleado"]},
    {id:"deudores",label:"Deudores",icon:"🔴",roles:["admin"]},
    {id:"distribuidores",label:"Distrib.",icon:"🏪",roles:["admin"]},
    {id:"caja",label:"Caja",icon:"📋",roles:["admin","empleado","tienda"]},
    {id:"usuarios",label:"Usuarios",icon:"👤",roles:["admin"]},
  ];
  const tabs=allTabs.filter(t=>t.roles.includes(user.rol));
  return <div style={{display:"flex",flexDirection:"column",height:"100vh"}}>
    <div className="app-header" style={{background:"#0d1424",padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:"1px solid rgba(99,179,237,0.15)",flexShrink:0,paddingTop:"max(12px,env(safe-area-inset-top))"}}>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <span style={{fontSize:18}}>📱</span>
        <span style={{fontWeight:900,fontSize:18,color:"#fff"}}>IMPORT</span>
        <span style={{fontWeight:900,fontSize:18,color:C.blue}}>CELLS</span>
        <span style={{background:"rgba(74,222,128,0.2)",color:C.green,fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:99}}>🟢 LIVE</span>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        {user.tienda&&<span style={{color:C.muted,fontSize:12}}>{user.tienda}</span>}
        <span style={{color:C.muted,fontSize:13}}>{user.nombre}</span>
        <button onClick={()=>setUser(null)} style={{background:C.redDim,border:"1px solid rgba(248,113,113,0.3)",borderRadius:8,padding:"6px 12px",color:C.red,cursor:"pointer",fontSize:13,fontWeight:700}}>Salir</button>
      </div>
    </div>
    <div className="app-content" style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
      {tab==="dashboard"&&<Dashboard user={user}/>}
      {tab==="inventario"&&<Inventario user={user}/>}
      {tab==="entregas"&&<Entregas user={user}/>}
      {tab==="ventas"&&<Ventas user={user}/>}
      {tab==="deudores"&&<Deudores user={user}/>}
      {tab==="distribuidores"&&<Distribuidores/>}
      {tab==="caja"&&<CierreCaja user={user}/>}
      {tab==="usuarios"&&<Usuarios/>}
    </div>
    <div className="app-nav" style={{background:"#0d1424",borderTop:"1px solid rgba(99,179,237,0.15)",display:"flex",flexShrink:0,paddingBottom:"max(14px,env(safe-area-inset-bottom))"}}>
      {tabs.map(t=><button key={t.id} className="app-nav-btn" onClick={()=>setTab(t.id)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"12px 4px 8px",background:"none",border:"none",cursor:"pointer",gap:4,minHeight:72,position:"relative"}}>
        {tab===t.id&&<div className="app-nav-underline" style={{position:"absolute",top:0,left:"20%",right:"20%",height:3,borderRadius:"0 0 4px 4px",background:C.blue}}/>}
        <span className="nav-icon" style={{fontSize:tab===t.id?32:26,lineHeight:1}}>{t.icon}</span>
        <span style={{fontSize:11,color:tab===t.id?C.blue:C.muted,fontWeight:tab===t.id?800:500}}>{t.label}</span>
      </button>)}
    </div>
  </div>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('/sw.js').catch(function(){});});}</script>
</body>
